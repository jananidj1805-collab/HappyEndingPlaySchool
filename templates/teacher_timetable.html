{% load custom_tags %}
<!DOCTYPE html>
<html>
<head>
    <title>Teacher Timetable</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .back {
            margin-bottom: 20px;
            display: inline-block;
            padding: 10px 18px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .back:hover {
            background: #125ea7;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
            font-size: 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
        }

        td {
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 15px;
            color: #333;
        }

        tr:nth-child(even) td {
            background: #f7f7f7;
        }

        .time-col {
            font-weight: bold;
            background: #f0f0f0 !important;
            width: 140px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="{% url 'teacher_dashboard' %}" class="back">← Back</a>

    <h2>📅 {{ teacher.teacher_class }} Timetable</h2>

    <table>
        <tr>
            <th>Time</th>
            {% for day in days %}
                <th>{{ day }}</th>
            {% endfor %}
        </tr>

        {% for slot in time_slots %}
        <tr>
            <td class="time-col">{{ slot }}</td>
            {% for day in days %}
                <td>{{ timetable_data|get_item:day|get_item:slot }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
