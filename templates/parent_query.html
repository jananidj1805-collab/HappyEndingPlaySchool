<!DOCTYPE html>
<html>
<head>
    <title>Parent Support</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 18px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #125ea7;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        input:focus, textarea:focus {
            border-color: #2196F3;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #2196F3;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1976d2;
        }

        .success {
            text-align: center;
            color: green;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="{% url 'student_dashboard' %}" class="back-btn">← Back</a>

    {% if messages %}
        {% for message in messages %}
            <div class="success">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <h2>📩 Parent Support</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="👤 Your Name" required>
        <input type="email" name="email" placeholder="📧 Your Email" required>
        <input type="text" name="subject" placeholder="📝 Subject" required>
        <textarea name="message" placeholder="✍️ Type your query here..." required></textarea>

        <button type="submit" class="btn">Send Query</button>
    </form>

</div>

</body>
</html>
