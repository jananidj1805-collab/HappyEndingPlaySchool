<!DOCTYPE html>
<html>
<head>
    <title>Marks</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fbc2eb, #a6c1ee);
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 18px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #125ea7;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .learning {
            font-size: 18px;
            font-weight: bold;
            color: #222;
        }

        .grade {
            margin-top: 8px;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 14px;
            color: white;
        }

        .A { background: #4CAF50; }
        .B { background: #2196F3; }
        .C { background: #FF9800; }
        .D { background: #f44336; }

        .comment {
            margin-top: 10px;
            color: #555;
            font-size: 14px;
        }

        .empty {
            text-align: center;
            background: #fff3cd;
            padding: 25px;
            border-radius: 10px;
            color: #856404;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="{% url 'student_dashboard' %}" class="back-btn">← Back to Dashboard</a>

    <h2 class="header">📊 Student Marks</h2>

    {% for m in marks %}
        <div class="card">

            <div class="learning">
                {{ m.learning }}
            </div>

            <span class="grade {{ m.grade }}">
                Grade: {{ m.grade }}
            </span>

            <div class="comment">
                💬 {{ m.comments }}
            </div>

        </div>

    {% empty %}

        <div class="empty">
            📭 No Marks Found
        </div>

    {% endfor %}

</div>

</body>
</html>
