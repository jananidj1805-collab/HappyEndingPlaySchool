<!DOCTYPE html>
<html>
<head>
    <title>Student Report</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .container {
            width: 75%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        select, input {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 80%;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
<div class="card">

<h2>📊 {{ student.name }} - Report</h2>

<form method="POST">
{% csrf_token %}

<table>
<tr>
    <th>Learning</th>
    <th>Grade</th>
    <th>Comments</th>
</tr>

{% for area in learning_areas %}
<tr>
    <td>{{ area }}</td>
    <td>
        <select name="grade_{{ area }}">
            <option>A</option>
            <option>B</option>
            <option>C</option>
        </select>
    </td>
    <td>
        <input type="text" name="comment_{{ area }}">
    </td>
</tr>
{% endfor %}
</table>

<button type="submit">💾 Save Marks</button>

</form>

</div>
</div>

</body>
</html>
