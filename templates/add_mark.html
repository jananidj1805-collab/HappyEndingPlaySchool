<!DOCTYPE html>
<html>
<head>
    <title>Add Marks</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        .container {
            width: 75%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h2 {
            text-align: center;
            flex: 1;
            margin: 0;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 18px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1976d2;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        select, input {
            padding: 8px;
            border-radius: 6px;
            width: 80%;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }
    </style>
</head>
<body>

<div class="container">
<div class="card">

    <div class="top-bar">
        <a href="{% url 'marks_students' %}" class="back-btn">← Back</a>
        <h2>📊 Add Marks - {{ student.name }}</h2>
    </div>

    {% if messages %}
        {% for message in messages %}
            <script>alert("{{ message }}");</script>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <table>
            <tr>
                <th>Learning</th>
                <th>Grade</th>
                <th>Comments</th>
            </tr>

            {% for area in learning_areas %}
            <tr>
                <td>{{ area }}</td>
                <td>
                    <select name="grade_{{ area|lower }}">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                    </select>
                </td>
                <td>
                    <input type="text" name="comment_{{ area|lower }}">
                </td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit">💾 Submit Marks</button>
    </form>

</div>
</div>

</body>
</html>
