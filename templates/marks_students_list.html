<!DOCTYPE html>
<html>
<head>
    <title>Select Student for Marks</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h2 {
            text-align: center;
            flex: 1;
            margin: 0;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 18px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1976d2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .mark-btn {
            display: inline-block;
            padding: 10px 18px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .mark-btn:hover {
            background: #43a047;
        }

        .no-data {
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container">
<div class="card">

    <div class="top-bar">
        <a href="{% url 'teacher_dashboard' %}" class="back-btn">← Back</a>
        <h2>📋 Select Student for Marks</h2>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.student_class }}</td>
                <td>
                    <a href="{% url 'add_marks' student.id %}" class="mark-btn">➕ Add Marks</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="no-data">No students found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
</div>

</body>
</html>
