<!DOCTYPE html>
<html>
<head>
    <title>Careers - Teacher Job</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 5px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        /* 🔥 BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #1976d2;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #125ea7;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76,175,80,0.5);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.03);
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: gray;
            margin-bottom: 15px;
        }
        
        select {
            height: 42px;
        }
   
   </style>
</head>

<body>

<div class="container">
    <div class="form-box">

        <!-- 🔥 BACK BUTTON -->
        <a href="{% url 'home' %}" class="back-btn">← </a>

        <div class="title">👨‍🏫 Teacher Job Application</div>
        <div class="subtitle">Apply to join our Playschool Team</div>

        {% if messages %}
            {% for message in messages %}
               <script>
                  alert("{{ message }}");
               </script>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="👤 Full Name" required>

            <input type="email" name="email" placeholder="📧 Email Address" required>

            <input type="text" name="phone" placeholder="📱 Phone Number" required>

            <input type="text" name="qualification" placeholder="🎓 Qualification">

            <select name="experience">
                <option value="">🧠 Experience Level</option>
                <option value="Fresher">Fresher</option>
                <option value="Experienced">Experienced</option>
            </select>

            <input type="text" name="subject" placeholder="📘 Subject / Skill">

            <textarea name="address" placeholder="🏠 Address"></textarea>

            <button type="submit">🚀 Apply Now</button>
        </form>

    </div>
</div>

</body>
</html>
