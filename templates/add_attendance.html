<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        .container {
            width: 70%;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h2 {
            text-align: center;
            flex: 1;
            margin: 0;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 18px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1976d2;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        select {
            padding: 6px;
            border-radius: 6px;
        }

        .present {
            background: #b9fbc0;
        }

        .absent {
            background: #ffadad;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }
    </style>

    <script>
        function changeColor(select) {
            select.className = (select.value === "Present") ? "present" : "absent";
        }
    </script>

</head>
<body>

<div class="container">

    <div class="top-bar">
        <a href="{% url 'teacher_dashboard' %}" class="back-btn">← Back</a>
        <h2>📘 Class Attendance</h2>
    </div>

    {% if messages %}
        {% for message in messages %}
            <script>alert("{{ message }}");</script>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="date" name="date" required>

        <table>
            <tr>
                <th>No</th>
                <th>Name</th>
                <th>Status</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ student.name }}</td>
                <td>
                    <select name="status_{{ student.id }}" onchange="changeColor(this)">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <button type="submit">💾 Save Attendance</button>
    </form>

</div>

</body>
</html>
